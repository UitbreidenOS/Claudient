# Swarm Sandbox Alerting Rules
# Monitor: sandbox failures, resource exhaustion, stuck agents, cleanup hangs
# Generated: 2026-06-22

---
alerting_config:
  version: "1.0.0"
  environment: "all"
  retention_days: 30
  alert_channels:
    - slack
    - email
    - pagerduty
  default_severity: "warning"
  evaluation_interval: "30s"

---
# CRITICAL ALERTS: Immediate action required
# =============================================================================

- name: "sandbox_initialization_failure"
  description: "Sandbox failed to initialize within timeout"
  severity: "critical"
  enabled: true
  condition: |
    metric: sandbox.init.failure_rate
    threshold: > 0.1  # >10% failure rate
    window: 5m
    operator: average
  actions:
    - type: "pagerduty"
      priority: "critical"
      escalate_after: 300  # 5 minutes
    - type: "slack"
      channel: "#swarm-alerts"
      message_template: |
        :rotating_light: CRITICAL: Sandbox initialization failing
        Failure rate: {{ metric.value }}% (threshold: 10%)
        Affected: {{ metric.sandbox_count }} sandboxes
        Time window: {{ metric.window }}
    - type: "auto_remediate"
      action: "restart_sandbox_service"
      max_retries: 3
      backoff: "exponential"

- name: "sandbox_agent_crash_loop"
  description: "Agents crashing repeatedly within sandbox"
  severity: "critical"
  enabled: true
  condition: |
    metric: sandbox.agent.crash_count
    threshold: >= 5
    window: 1m
    operator: sum
  actions:
    - type: "pagerduty"
      priority: "critical"
      escalate_after: 180  # 3 minutes
    - type: "slack"
      channel: "#swarm-alerts"
      message_template: |
        :warning: CRITICAL: Agent crash loop detected
        Crashes in last 1m: {{ metric.crash_count }}
        Sandbox: {{ metric.sandbox_name }}
        Last error: {{ metric.last_error }}
    - type: "auto_remediate"
      action: "isolate_sandbox"
      params:
        stop_new_agents: true
        preserve_logs: true

- name: "sandbox_resource_exhaustion"
  description: "Sandbox reached critical resource limits"
  severity: "critical"
  enabled: true
  condition: |
    metric: sandbox.resource.exhaustion
    threshold: >= 95  # percent
    attributes:
      - resource: "memory"
      - resource: "disk"
      - resource: "file_descriptors"
    window: 30s
    operator: any
  actions:
    - type: "pagerduty"
      priority: "critical"
      escalate_after: 120  # 2 minutes
    - type: "slack"
      channel: "#swarm-alerts"
      message_template: |
        :exploding_head: CRITICAL: Resource exhaustion
        Resource: {{ metric.resource }}
        Usage: {{ metric.value }}%
        Sandbox: {{ metric.sandbox_name }}
        Agents: {{ metric.agent_count }}
    - type: "auto_remediate"
      action: "force_cleanup"
      params:
        timeout_ms: 5000
        kill_agents: true

- name: "cleanup_hang_detected"
  description: "Cleanup process hanging beyond timeout"
  severity: "critical"
  enabled: true
  condition: |
    metric: sandbox.cleanup.duration_ms
    threshold: > 10000  # milliseconds (10 seconds)
    window: 30s
    operator: max
    filter:
      status: "in_progress"
  actions:
    - type: "pagerduty"
      priority: "critical"
      escalate_after: 300  # 5 minutes
    - type: "slack"
      channel: "#swarm-alerts"
      message_template: |
        :hourglass_flowing_sand: CRITICAL: Cleanup hang detected
        Duration: {{ metric.value }}ms (max: 10000ms)
        Sandbox: {{ metric.sandbox_name }}
        Started: {{ metric.start_time }}
    - type: "auto_remediate"
      action: "force_cleanup_kill"
      params:
        signal: "SIGKILL"
        timeout_ms: 2000

---
# HIGH PRIORITY ALERTS: Address within 1 hour
# =============================================================================

- name: "agent_timeout_rate_high"
  description: "Agents timing out at elevated rate"
  severity: "high"
  enabled: true
  condition: |
    metric: sandbox.agent.timeout_rate
    threshold: > 0.2  # >20% timeout rate
    window: 10m
    operator: average
  actions:
    - type: "pagerduty"
      priority: "high"
      escalate_after: 1800  # 30 minutes
    - type: "slack"
      channel: "#swarm-alerts"
      message_template: |
        :alarm_clock: HIGH: Agent timeout rate elevated
        Timeout rate: {{ metric.timeout_rate }}% (threshold: 20%)
        Sandboxes affected: {{ metric.sandbox_count }}
        Time window: {{ metric.window }}

- name: "worker_orphaned_process"
  description: "Orphaned worker process detected (zombie/unkillable)"
  severity: "high"
  enabled: true
  condition: |
    metric: sandbox.worker.orphaned_count
    threshold: >= 1
    window: 5m
    operator: sum
  actions:
    - type: "pagerduty"
      priority: "high"
      escalate_after: 1800  # 30 minutes
    - type: "slack"
      channel: "#swarm-alerts"
      message_template: |
        :zombie: HIGH: Orphaned worker process
        Count: {{ metric.orphaned_count }}
        PID: {{ metric.pids }}
        Status: {{ metric.process_status }}
    - type: "auto_remediate"
      action: "kill_orphaned_workers"
      params:
        signal: "SIGKILL"
        grace_period_ms: 1000

- name: "git_worktree_lock_accumulation"
  description: "Git worktree locks accumulating (resource leak)"
  severity: "high"
  enabled: true
  condition: |
    metric: sandbox.git_worktree.locked_count
    threshold: >= 5
    window: 5m
    operator: max
  actions:
    - type: "pagerduty"
      priority: "high"
      escalate_after: 1800  # 30 minutes
    - type: "slack"
      channel: "#swarm-alerts"
      message_template: |
        :lock: HIGH: Git worktree locks accumulating
        Locked worktrees: {{ metric.locked_count }}
        Max allowed: 4
        Sandbox: {{ metric.sandbox_name }}
    - type: "auto_remediate"
      action: "cleanup_git_worktrees"
      params:
        force: true
        remove_all: false
        preserve_active: true

- name: "session_context_window_near_limit"
  description: "Session approaching context window exhaustion"
  severity: "high"
  enabled: true
  condition: |
    metric: sandbox.session.context_usage_percent
    threshold: > 85
    window: 2m
    operator: average
  actions:
    - type: "pagerduty"
      priority: "high"
      escalate_after: 1200  # 20 minutes
    - type: "slack"
      channel: "#swarm-alerts"
      message_template: |
        :brain: HIGH: Context window near limit
        Usage: {{ metric.context_usage }}% (threshold: 85%)
        Session: {{ metric.session_id }}
        Tokens used: {{ metric.tokens_used }}/{{ metric.token_limit }}

- name: "message_queue_backing_up"
  description: "Inter-agent message queue depth exceeding safe threshold"
  severity: "high"
  enabled: true
  condition: |
    metric: sandbox.message_queue.depth
    threshold: > 1000
    window: 1m
    operator: max
  actions:
    - type: "pagerduty"
      priority: "high"
      escalate_after: 900  # 15 minutes
    - type: "slack"
      channel: "#swarm-alerts"
      message_template: |
        :mailbox_with_mail: HIGH: Message queue backing up
        Queue depth: {{ metric.queue_depth }}
        Max safe: 1000
        Sandbox: {{ metric.sandbox_name }}
        Agents: {{ metric.agent_count }}

---
# MEDIUM PRIORITY ALERTS: Address within 4 hours
# =============================================================================

- name: "memory_growth_rate_anomaly"
  description: "Sandbox memory growth exceeding threshold"
  severity: "warning"
  enabled: true
  condition: |
    metric: sandbox.memory.growth_rate_mb_per_min
    threshold: > 100
    window: 5m
    operator: average
  actions:
    - type: "slack"
      channel: "#swarm-ops"
      message_template: |
        :chart_with_upwards_trend: WARNING: Memory growth rate high
        Growth rate: {{ metric.growth_rate }} MB/min (threshold: 100)
        Current heap: {{ metric.heap_used_mb }} MB
        Sandbox: {{ metric.sandbox_name }}
    - type: "email"
      recipients: ["ops@company.com"]
      subject: "[Swarm] Memory growth rate anomaly - {{ metric.sandbox_name }}"

- name: "agent_latency_p99_threshold_exceeded"
  description: "Agent message latency P99 exceeding acceptable threshold"
  severity: "warning"
  enabled: true
  condition: |
    metric: sandbox.agent.latency_p99_ms
    threshold: > 5000
    window: 5m
    operator: average
  actions:
    - type: "slack"
      channel: "#swarm-ops"
      message_template: |
        :stopwatch: WARNING: Agent latency P99 high
        Latency: {{ metric.latency_p99 }}ms (threshold: 5000ms)
        P95: {{ metric.latency_p95 }}ms
        Sandbox: {{ metric.sandbox_name }}

- name: "error_rate_threshold_exceeded"
  description: "Sandbox error rate above acceptable threshold"
  severity: "warning"
  enabled: true
  condition: |
    metric: sandbox.execution.error_rate
    threshold: > 0.05  # >5%
    window: 10m
    operator: average
  actions:
    - type: "slack"
      channel: "#swarm-ops"
      message_template: |
        :x: WARNING: Error rate elevated
        Error rate: {{ metric.error_rate }}% (threshold: 5%)
        Total errors: {{ metric.error_count }}
        Sandbox: {{ metric.sandbox_name }}
        Time window: {{ metric.window }}

- name: "api_response_latency_degradation"
  description: "Sandbox API endpoint response time degraded"
  severity: "warning"
  enabled: true
  condition: |
    metric: sandbox.api.response_time_p99_ms
    threshold: > 3000
    window: 5m
    operator: average
  actions:
    - type: "slack"
      channel: "#swarm-ops"
      message_template: |
        :turtle: WARNING: API latency degraded
        Response time P99: {{ metric.response_time_p99 }}ms
        P50: {{ metric.response_time_p50 }}ms
        Endpoint: {{ metric.endpoint }}

- name: "disk_usage_high"
  description: "Sandbox disk usage exceeding warning threshold"
  severity: "warning"
  enabled: true
  condition: |
    metric: sandbox.disk.usage_percent
    threshold: > 80
    window: 5m
    operator: max
  actions:
    - type: "slack"
      channel: "#swarm-ops"
      message_template: |
        :floppy_disk: WARNING: Disk usage high
        Usage: {{ metric.disk_usage }}% (threshold: 80%)
        Available: {{ metric.disk_available_gb }}GB
        Sandbox: {{ metric.sandbox_name }}

- name: "network_egress_allowlist_escalations"
  description: "Elevated rate of network egress escalations (non-allowlist hosts)"
  severity: "warning"
  enabled: true
  condition: |
    metric: sandbox.network.egress_escalation_rate
    threshold: > 10
    window: 5m
    operator: sum
  actions:
    - type: "slack"
      channel: "#swarm-ops"
      message_template: |
        :globe_with_meridians: WARNING: Network escalations elevated
        Escalations in 5m: {{ metric.escalation_count }}
        Hosts: {{ metric.hosts }}
        Sandbox: {{ metric.sandbox_name }}

---
# INFORMATIONAL ALERTS: Track and trending
# =============================================================================

- name: "sandbox_lifecycle_event"
  description: "Sandbox lifecycle events (init, start, stop, cleanup)"
  severity: "info"
  enabled: true
  condition: |
    metric: sandbox.lifecycle.event
    filter:
      event_type: ["init", "start", "stop", "cleanup"]
  actions:
    - type: "slack"
      channel: "#swarm-lifecycle"
      message_template: |
        :package: Sandbox lifecycle event
        Event: {{ metric.event_type }}
        Sandbox: {{ metric.sandbox_name }}
        Status: {{ metric.status }}
        Duration: {{ metric.duration_ms }}ms

- name: "agent_spawned_tracked"
  description: "Track agent spawn events (informational)"
  severity: "info"
  enabled: false  # Disable by default (high volume)
  condition: |
    metric: sandbox.agent.spawned
  actions:
    - type: "slack"
      channel: "#swarm-lifecycle"
      message_template: |
        :robot: Agent spawned
        Agent: {{ metric.agent_id }}
        Role: {{ metric.agent_role }}
        Model: {{ metric.model }}

- name: "tool_execution_tracked"
  description: "Tool execution (bash, file ops, web search) - informational"
  severity: "info"
  enabled: false  # Disable by default (high volume)
  condition: |
    metric: sandbox.tool.executed
    filter:
      tool_type: ["bash", "file_ops", "web_search"]
  actions:
    - type: "slack"
      channel: "#swarm-tools"
      message_template: |
        :wrench: Tool executed
        Tool: {{ metric.tool_type }}
        Agent: {{ metric.agent_id }}
        Duration: {{ metric.duration_ms }}ms

---
# SLO/SLA TRACKING ALERTS
# =============================================================================

- name: "sandbox_availability_slo_miss"
  description: "Sandbox availability below SLO threshold (99%)"
  severity: "high"
  enabled: true
  condition: |
    metric: sandbox.slo.availability_percent
    threshold: < 99.0
    window: 24h
    operator: average
  actions:
    - type: "pagerduty"
      priority: "high"
      escalate_after: 3600  # 1 hour
    - type: "slack"
      channel: "#swarm-slo"
      message_template: |
        :chart_with_downwards_trend: SLO MISS: Availability below 99%
        Current: {{ metric.availability }}%
        SLO: 99%
        Window: 24h
    - type: "email"
      recipients: ["sre@company.com"]
      subject: "[SLO] Sandbox availability SLO miss"

- name: "cleanup_performance_slo_miss"
  description: "Cleanup operation duration exceeds SLO target"
  severity: "warning"
  enabled: true
  condition: |
    metric: sandbox.cleanup.p95_duration_ms
    threshold: > 5000
    window: 24h
    operator: average
  actions:
    - type: "slack"
      channel: "#swarm-slo"
      message_template: |
        :hourglass: SLO MISS: Cleanup performance below target
        Current P95: {{ metric.cleanup_p95 }}ms
        Target: 5000ms
        Window: 24h

---
# COMPOSITE ALERTS: Multi-condition scenarios
# =============================================================================

- name: "cascading_failure_detected"
  description: "Multiple failure indicators detected simultaneously"
  severity: "critical"
  enabled: true
  condition: |
    all:
      - metric: sandbox.agent.crash_count > 3 (window: 2m)
      - metric: sandbox.message_queue.depth > 800 (window: 2m)
      - metric: sandbox.execution.error_rate > 0.1 (window: 2m)
  actions:
    - type: "pagerduty"
      priority: "critical"
      escalate_after: 120  # 2 minutes
    - type: "slack"
      channel: "#swarm-alerts"
      message_template: |
        :fire: CRITICAL: Cascading failure detected
        Agent crashes: {{ metric.crash_count }} (threshold: 3)
        Queue depth: {{ metric.queue_depth }} (threshold: 800)
        Error rate: {{ metric.error_rate }}% (threshold: 10%)
        Sandbox: {{ metric.sandbox_name }}
    - type: "auto_remediate"
      action: "emergency_stop"
      params:
        preserve_logs: true
        snapshot_state: true

- name: "resource_exhaustion_cascade"
  description: "Resource exhaustion leading to performance degradation"
  severity: "critical"
  enabled: true
  condition: |
    all:
      - metric: sandbox.resource.exhaustion >= 90 (any resource)
      - metric: sandbox.agent.latency_p99_ms > 10000 (window: 1m)
      - metric: sandbox.agent.timeout_rate > 0.3 (window: 1m)
  actions:
    - type: "pagerduty"
      priority: "critical"
      escalate_after: 180  # 3 minutes
    - type: "slack"
      channel: "#swarm-alerts"
      message_template: |
        :warning: CRITICAL: Resource exhaustion cascade
        Resource usage: {{ metric.resource_usage }}%
        Latency P99: {{ metric.latency_p99 }}ms
        Timeout rate: {{ metric.timeout_rate }}%
        Sandbox: {{ metric.sandbox_name }}
    - type: "auto_remediate"
      action: "auto_scale_down"
      params:
        reduce_agents: 0.5
        timeout_ms: 8000

---
# THRESHOLD DEFINITIONS
# =============================================================================

thresholds:
  sandbox:
    # Initialization
    init_timeout_ms: 30000
    init_failure_rate_critical: 0.10

    # Agent lifecycle
    agent_crash_critical: 5  # crashes in 1m
    agent_timeout_rate_high: 0.20  # >20% timeouts
    agent_timeout_rate_critical: 0.50  # >50% timeouts

    # Resource limits
    memory_limit_mb: 1024  # per agent
    disk_limit_gb: 5  # per agent
    cpu_limit_cores: 1  # per agent
    file_descriptor_limit: 1024

    # Resource exhaustion
    resource_exhaustion_critical: 95  # percent
    resource_exhaustion_warning: 80  # percent
    memory_growth_rate_mb_per_min: 100

    # Messaging
    message_queue_max_safe: 1000
    message_queue_critical: 5000

    # Latency
    api_response_time_p99_ms: 3000
    agent_latency_p99_ms: 5000

    # Cleanup
    cleanup_timeout_ms: 10000
    cleanup_p95_target_ms: 5000

    # Error rates
    error_rate_threshold: 0.05  # >5%
    error_rate_critical: 0.20  # >20%

    # Context window
    context_usage_warning_percent: 85
    context_usage_critical_percent: 95

    # Disk
    disk_usage_warning_percent: 80
    disk_usage_critical_percent: 95

    # SLO targets
    availability_slo_percent: 99.0
    cleanup_slo_p95_ms: 5000

---
# DASHBOARD DEFINITIONS
# =============================================================================

dashboards:
  - name: "swarm_sandbox_overview"
    refresh_interval_s: 30
    panels:
      - title: "Sandbox Status"
        metric: "sandbox.status"
        visualization: "status_grid"
      - title: "Agent Count"
        metric: "sandbox.agent.count"
        visualization: "gauge"
      - title: "Error Rate"
        metric: "sandbox.execution.error_rate"
        visualization: "line_chart"
      - title: "Resource Usage"
        metrics:
          - "sandbox.resource.memory_percent"
          - "sandbox.resource.cpu_percent"
          - "sandbox.resource.disk_percent"
        visualization: "stacked_area"
      - title: "Message Queue Depth"
        metric: "sandbox.message_queue.depth"
        visualization: "line_chart"
      - title: "Agent Latency Distribution"
        metrics:
          - "sandbox.agent.latency_p50_ms"
          - "sandbox.agent.latency_p95_ms"
          - "sandbox.agent.latency_p99_ms"
        visualization: "line_chart"

  - name: "swarm_sandbox_health"
    refresh_interval_s: 10
    panels:
      - title: "Alive Agents"
        metric: "sandbox.agent.alive_count"
        visualization: "stat"
      - title: "Failed Agents"
        metric: "sandbox.agent.failed_count"
        visualization: "stat"
      - title: "Orphaned Processes"
        metric: "sandbox.worker.orphaned_count"
        visualization: "stat"
      - title: "Timeout Rate"
        metric: "sandbox.agent.timeout_rate"
        visualization: "gauge"
      - title: "Memory Usage"
        metric: "sandbox.resource.memory_mb"
        visualization: "line_chart"
      - title: "Cleanup Duration"
        metric: "sandbox.cleanup.duration_ms"
        visualization: "line_chart"

  - name: "swarm_sandbox_lifecycle"
    refresh_interval_s: 60
    panels:
      - title: "Sandbox Creations"
        metric: "sandbox.lifecycle.created_count"
        visualization: "bar_chart"
      - title: "Sandbox Deletions"
        metric: "sandbox.lifecycle.deleted_count"
        visualization: "bar_chart"
      - title: "Cleanup Success Rate"
        metric: "sandbox.cleanup.success_rate"
        visualization: "gauge"
      - title: "Execution Timeline"
        metric: "sandbox.execution.timeline"
        visualization: "timeline"

---
# NOTIFICATION TEMPLATES
# =============================================================================

notification_templates:
  slack:
    default: |
      :warning: Alert: {{ alert.name }}
      Severity: {{ alert.severity }}
      Sandbox: {{ metric.sandbox_name }}
      Value: {{ metric.value }} (threshold: {{ alert.threshold }})
      Time: {{ timestamp }}

    critical: |
      :rotating_light: CRITICAL ALERT
      Name: {{ alert.name }}
      Sandbox: {{ metric.sandbox_name }}
      Status: {{ metric.status }}
      Action: {{ actions[0].action }}
      Details: {{ alert.description }}

  pagerduty:
    default: |
      Alert: {{ alert.name }}
      Severity: {{ alert.severity }}
      Value: {{ metric.value }}
      Sandbox: {{ metric.sandbox_name }}

    critical: |
      CRITICAL: {{ alert.name }}
      Immediate action required on {{ metric.sandbox_name }}
      Details: {{ alert.description }}

  email:
    subject: "[{{ alert.severity }}] {{ alert.name }}"
    body: |
      Alert: {{ alert.name }}
      Severity: {{ alert.severity }}
      Description: {{ alert.description }}

      Metric: {{ metric.name }}
      Current value: {{ metric.value }}
      Threshold: {{ alert.threshold }}

      Sandbox: {{ metric.sandbox_name }}
      Time: {{ timestamp }}

      Recommended actions:
      {{ actions | map(attribute='description') | join('\n') }}

---
# AUTO-REMEDIATION ACTIONS
# =============================================================================

remediation_actions:
  - name: "restart_sandbox_service"
    description: "Restart the sandbox service"
    steps:
      - command: "docker restart swarm-sandbox-service"
      - wait: 5000  # 5 second wait
      - verify: "curl http://localhost:3001/health"
    timeout_ms: 30000
    max_retries: 3
    backoff: "exponential"

  - name: "isolate_sandbox"
    description: "Isolate sandbox to prevent cascading failures"
    steps:
      - command: "kubectl patch sandbox {{ sandbox_name }} -p '{\"spec\":{\"isolated\":true}}'"
      - wait: 2000
      - notify: "ops@company.com"
    timeout_ms: 10000
    max_retries: 1

  - name: "force_cleanup"
    description: "Force cleanup with timeout"
    steps:
      - command: "claudient swarm-sandbox cleanup {{ sandbox_name }}"
      - timeout: 5000
      - verify: "[ ! -d ~/.claude/swarm-sandboxes/{{ sandbox_name }} ]"
    timeout_ms: 10000
    max_retries: 1

  - name: "force_cleanup_kill"
    description: "Force cleanup with SIGKILL"
    steps:
      - command: "pkill -9 -f 'sandbox.*{{ sandbox_name }}'"
      - wait: 1000
      - command: "rm -rf ~/.claude/swarm-sandboxes/{{ sandbox_name }}"
    timeout_ms: 5000
    max_retries: 1

  - name: "kill_orphaned_workers"
    description: "Kill orphaned worker processes"
    steps:
      - command: "pkill -9 -f 'claude.*worker'"
      - wait: 2000
      - verify: "[ $(pgrep -f 'claude.*worker' | wc -l) -eq 0 ]"
    timeout_ms: 10000
    max_retries: 2

  - name: "cleanup_git_worktrees"
    description: "Cleanup locked git worktrees"
    steps:
      - command: "git worktree list --porcelain | grep locked | awk '{print $1}' | xargs git worktree remove --force"
      - wait: 2000
      - command: "git gc"
    timeout_ms: 30000
    max_retries: 1

  - name: "emergency_stop"
    description: "Emergency stop with state preservation"
    steps:
      - command: "tar czf /tmp/sandbox-emergency-backup-{{ timestamp }}.tar.gz ~/.claude/swarm-sandboxes/{{ sandbox_name }}"
      - wait: 5000
      - command: "claudient swarm-sandbox cleanup {{ sandbox_name }}"
      - notify: "ops@company.com"
    timeout_ms: 30000
    max_retries: 1

  - name: "auto_scale_down"
    description: "Auto-scale down agent replicas"
    steps:
      - command: "kubectl scale sandbox {{ sandbox_name }} --replicas={{ replicas * 0.5 }}"
      - wait: 5000
      - verify: "kubectl get sandbox {{ sandbox_name }} -o jsonpath='{.spec.replicas}'"
    timeout_ms: 20000
    max_retries: 2

---
# MONITORING SETUP SCRIPT
# =============================================================================

setup_instructions: |
  ## Installation & Setup

  ### 1. Deploy Prometheus metrics exporter
  ```bash
  npm install --save-dev @prometheus/client
  npm run start:metrics-exporter
  ```

  ### 2. Configure alerting receiver
  ```bash
  # Create .claude/settings.json or update existing:
  {
    "monitoring": {
      "alerting_enabled": true,
      "alerting_rules_path": "./alerting-rules.yaml",
      "evaluation_interval": "30s",
      "channels": {
        "slack": {
          "webhook_url": "https://hooks.slack.com/services/YOUR/WEBHOOK/URL",
          "enabled": true
        },
        "pagerduty": {
          "integration_key": "YOUR_PAGERDUTY_KEY",
          "enabled": true
        },
        "email": {
          "smtp_server": "smtp.company.com",
          "from_address": "alerts@company.com",
          "enabled": true
        }
      },
      "auto_remediation": {
        "enabled": true,
        "verify_before_action": true
      }
    }
  }
  ```

  ### 3. Load alerting rules
  ```bash
  claudient alert:load --rules alerting-rules.yaml
  ```

  ### 4. Verify rules
  ```bash
  claudient alert:list
  claudient alert:test --rule sandbox_initialization_failure
  ```

  ### 5. Monitor alerts in real-time
  ```bash
  claudient alert:watch
  ```

  ### 6. View metrics dashboard
  ```bash
  open http://localhost:3001/dashboard
  ```

