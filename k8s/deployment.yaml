---
# ConfigMap for feature flags
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-feature-flags
  namespace: default
  labels:
    app: claudient
    version: v1
data:
  features.json: |
    {
      "enable_analytics": true,
      "enable_debug_mode": false,
      "enable_experimental_ui": false,
      "enable_caching": true,
      "cache_ttl_seconds": 3600,
      "max_retries": 3,
      "log_level": "info"
    }
  config.yaml: |
    app:
      name: claudient
      version: 1.0.0
      environment: production
    features:
      analytics_enabled: true
      debug_mode: false
    limits:
      max_connections: 1000
      request_timeout_seconds: 30

---
# Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: claudient-app
  namespace: default
  labels:
    app: claudient
    version: v1
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: claudient
  template:
    metadata:
      labels:
        app: claudient
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: claudient-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
      - name: claudient
        image: claudient:latest
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        - name: metrics
          containerPort: 8081
          protocol: TCP

        # Environment variables
        env:
        - name: APP_ENV
          value: "production"
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: app-feature-flags
              key: log_level
        - name: FEATURE_FLAGS_PATH
          value: "/etc/config/features.json"
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace

        # Resource limits and requests
        resources:
          requests:
            cpu: 250m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi

        # Readiness Probe
        readinessProbe:
          httpGet:
            path: /healthz/ready
            port: http
            scheme: HTTP
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          successThreshold: 1
          failureThreshold: 3

        # Liveness Probe
        livenessProbe:
          httpGet:
            path: /healthz/live
            port: http
            scheme: HTTP
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 3

        # Startup Probe (optional, for slow-starting apps)
        startupProbe:
          httpGet:
            path: /healthz/startup
            port: http
            scheme: HTTP
          initialDelaySeconds: 0
          periodSeconds: 10
          timeoutSeconds: 3
          successThreshold: 1
          failureThreshold: 30

        # Volume mounts
        volumeMounts:
        - name: config-volume
          mountPath: /etc/config
          readOnly: true
        - name: tmp-volume
          mountPath: /tmp
        - name: cache-volume
          mountPath: /app/cache

      # Volumes
      volumes:
      - name: config-volume
        configMap:
          name: app-feature-flags
          defaultMode: 0644
      - name: tmp-volume
        emptyDir:
          medium: Memory
          sizeLimit: 100Mi
      - name: cache-volume
        emptyDir:
          sizeLimit: 500Mi

      # Pod-level security and scheduling
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - claudient
              topologyKey: kubernetes.io/hostname

      terminationGracePeriodSeconds: 30

---
# Service
apiVersion: v1
kind: Service
metadata:
  name: claudient-service
  namespace: default
  labels:
    app: claudient
spec:
  type: ClusterIP
  selector:
    app: claudient
  ports:
  - name: http
    port: 80
    targetPort: http
    protocol: TCP
  - name: metrics
    port: 8081
    targetPort: metrics
    protocol: TCP

---
# ServiceAccount
apiVersion: v1
kind: ServiceAccount
metadata:
  name: claudient-sa
  namespace: default
  labels:
    app: claudient

---
# HorizontalPodAutoscaler
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: claudient-hpa
  namespace: default
  labels:
    app: claudient
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: claudient-app
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100
        periodSeconds: 30
      - type: Pods
        value: 2
        periodSeconds: 30
      selectPolicy: Max

---
# PodDisruptionBudget
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: claudient-pdb
  namespace: default
  labels:
    app: claudient
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: claudient
