version: '3.9'

services:
  claudient:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: claudient
    ports:
      # Health check & metrics port
      - "9000:9000"
      # Dashboard port
      - "4321:4321"
      # Alternative dashboard port
      - "3000:3000"
    environment:
      NODE_ENV: production
      HEALTH_PORT: 9000
    volumes:
      # Mount Claude Code directory for skill/agent/hook integration
      - ${HOME}/.claude:/root/.claude
      # Mount current project for CLI usage
      - .:/workspace
    working_dir: /app
    command: node /app/bin/health-server.js
    healthcheck:
      test: ["CMD", "node", "/app/health/check.js"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE

  # Optional: Dashboard service (runs Astro dev server)
  dashboard:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: claudient-dashboard
    depends_on:
      claudient:
        condition: service_healthy
    ports:
      - "4321:4321"
    environment:
      NODE_ENV: development
    volumes:
      - ${HOME}/.claude:/root/.claude
      - ./site:/app/site
    working_dir: /app/site
    command: npm run dev
    restart: unless-stopped

networks:
  default:
    name: claudient-network
    driver: bridge
